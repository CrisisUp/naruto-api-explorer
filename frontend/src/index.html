<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff6b35">
    <title>🍥 Naruto API Explorer</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>🍥 Naruto API Explorer</h1>
            <p>Explore o universo Naruto com dados da API pública</p>
        </header>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="🔍 Buscar personagem por nome...">
            <button id="searchBtn">Buscar</button>
            <button id="topJutsuBtn">🏆 Top Jutsus</button>
            <button id="randomBtn">🎲 Personagem Aleatório</button>
        </div>

        <div id="characterInfo" class="character-card hidden">
            <div class="character-header">
                <h2 id="characterName"></h2>
                <span id="characterStatus" class="status-badge"></span>
            </div>

            <div class="character-grid">
                <div class="info-section">
                    <h3>📋 Informações Pessoais</h3>
                    <div id="personalInfo"></div>
                </div>

                <div class="info-section">
                    <h3>👨‍👩‍👧‍👦 Família</h3>
                    <div id="familyInfo"></div>
                </div>

                <div class="info-section full-width">
                    <h3>⚔️ Jutsus</h3>
                    <div id="jutsuList"></div>
                </div>
            </div>
        </div>

        <div id="charactersList" class="characters-grid"></div>

        <div id="loading" class="loading hidden">Carregando...</div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>

</html>

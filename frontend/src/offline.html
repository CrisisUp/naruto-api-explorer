<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>📡 Offline</title>
    <style>
        body {
            background: #1a1a2e;
            color: #fff;

            display: flex;

            height: 100vh;
            text-align: center;
            margin: 0;
        }
        .offline-container {
            max-width: 400px;
            padding: 20px;
        }

        p { opacity: 0.8; }

    <div class="offline-container">
        <div class="emoji">📡</div>
        <h1>Você está offline</h1>

        <p style="font-size: 0.8em; margin-top: 20px;">

        </p>
    </div>

</html>
